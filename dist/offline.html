<!DOCTYPE html>
<html lang="fr-CM">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a6b3a" />
  <title>Yorix — Hors ligne</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "DM Sans", system-ui, sans-serif;
      background: linear-gradient(145deg, #0a1410, #1a3a24 50%, #0d3320);
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 32px 28px;
      backdrop-filter: blur(12px);
    }
    h1 {
      font-family: Syne, system-ui, sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      margin: 0 0 12px;
      letter-spacing: -0.03em;
    }
    p { margin: 0; color: rgba(255,255,255,.75); line-height: 1.65; font-size: .92rem; }
    a {
      display: inline-block;
      margin-top: 22px;
      padding: 12px 22px;
      border-radius: 11px;
      background: linear-gradient(135deg, #fcd116, #f59e0b);
      color: #0d1f14;
      font-weight: 800;
      text-decoration: none;
      font-family: Syne, system-ui, sans-serif;
      font-size: .88rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion internet, puis rouvrez Yorix. Vos commandes et messages seront synchronisés automatiquement.</p>
    <a href="/">Réessayer</a>
  </div>
</body>
</html>
